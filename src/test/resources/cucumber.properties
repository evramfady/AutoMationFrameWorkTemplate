# Shared Cucumber configuration, read automatically from the classpath.
# Individual runners only need to declare their tag filter.
cucumber.glue=StepDefinitions,Hooks
cucumber.features=src/test/resources/features
cucumber.plugin=pretty,html:testOutputs/cucumber/report.html,json:testOutputs/cucumber/report.json,io.qameta.allure.cucumber7jvm.AllureCucumber7Jvm
cucumber.publish.quiet=true
